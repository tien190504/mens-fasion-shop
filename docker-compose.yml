services:
  db:
    image: postgres:16
    container_name: fashion_shop_postgres
    environment:
      POSTGRES_DB: fashion_shop
      POSTGRES_USER: fashionshop
      POSTGRES_PASSWORD: fashionshop
    ports:
      - "5432:5432"
    volumes:
      - fashion_shop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashionshop -d fashion_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_shop_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/fashion_shop
      DB_USERNAME: fashionshop
      DB_PASSWORD: fashionshop
      JWT_SECRET: dev-docker-secret-change-this-in-production-123456
      JWT_EXPIRATION: PT2H
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  fashion_shop_pgdata:
