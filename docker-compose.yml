services:
  db:
    image: postgres:16
    container_name: mens-fashion-postgres
    environment:
      POSTGRES_DB: mens_fashion
      POSTGRES_USER: mensfashion
      POSTGRES_PASSWORD: mensfashion
    ports:
      - "5432:5432"
    volumes:
      - mens_fashion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mensfashion -d mens_fashion"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mens-fashion-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/mens_fashion
      DB_USERNAME: mensfashion
      DB_PASSWORD: mensfashion
      JWT_SECRET: dev-docker-secret-change-this-in-production-123456
      JWT_EXPIRATION: PT2H
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mens_fashion_pgdata:
