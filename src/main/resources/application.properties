spring.application.name=fashion_shop_backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fashion_shop}
spring.datasource.username=${DB_USERNAME:fashionshop}
spring.datasource.password=${DB_PASSWORD:fashionshop}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.prefer_native_enum_types=true

app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-to-at-least-32-characters}
app.jwt.expiration=${JWT_EXPIRATION:PT2H}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.admin.email=${APP_ADMIN_EMAIL:admin@fashionshop.local}
app.admin.password=${APP_ADMIN_PASSWORD:admin12345}
app.admin.full-name=${APP_ADMIN_FULL_NAME:Admin}

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
