spring.application.name=mens-fashion-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mens_fashion}
spring.datasource.username=${DB_USERNAME:mensfashion}
spring.datasource.password=${DB_PASSWORD:mensfashion}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.prefer_native_enum_types=true

app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-to-at-least-32-characters}
app.jwt.expiration=${JWT_EXPIRATION:PT2H}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.admin.email=${APP_ADMIN_EMAIL:admin@mensfashion.local}
app.admin.password=${APP_ADMIN_PASSWORD:admin12345}
app.admin.full-name=${APP_ADMIN_FULL_NAME:Admin}
